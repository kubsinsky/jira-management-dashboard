<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #2563eb;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-app-region: drag;
    }
    .icon {
      width: 56px; height: 56px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .icon svg { width: 32px; height: 32px; }
    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 12px;
      opacity: 0.65;
      margin-bottom: 24px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="10" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="16" cy="16" r="2.5" fill="white"/>
      <line x1="16" y1="13.5" x2="10.5" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <circle cx="23" cy="10" r="1.4" fill="rgba(255,255,255,0.5)"/>
      <circle cx="9" cy="10" r="1.4" fill="rgba(255,255,255,0.5)"/>
      <circle cx="7" cy="16" r="1.4" fill="rgba(255,255,255,0.5)"/>
    </svg>
  </div>
  <div class="title">Jira Management Dashboard</div>
  <div class="subtitle">Starting…</div>
  <div class="spinner"></div>
</body>
</html>
